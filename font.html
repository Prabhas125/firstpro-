<html>
    <head>
        <style type="text/css">
            h1{
                color: rgb(46, 159, 204);
                text-align: center;
                text-decoration: underline;
                font-family: Arial, Helvetica, sans-serif;
                font-size:30px;
                font-weight: bold;

            }
            h2{
                color: rgb(43, 152, 116);
                text-transform: capitalize;
                text-indent: 10px;
                letter-spacing: 3px;
                word-spacing: 5px;
                text-shadow: 2px rgb(120, 232, 219);
                font-weight: 100;
                font-variant: normal;

            }
            p{
                color: rgb(218, 154, 58);
                direction: rtl;
                text-align: end;
                line-height: 0.8;
                font-family: 'Courier New', Courier, monospace;
                font-size: small;
                font-weight: normal;
            }
        </style>

    </head>
    <body>
        <h1>CSS is a language that describes the style of an HTML document.</h1>
        <h2>CSS describes how HTML elements should be displayed.</h2>
        <p>CSS is used to define styles for your web pages, including the design, layout and
variations in display for different devices and screen sizes.</p>
    </body>
</html>
